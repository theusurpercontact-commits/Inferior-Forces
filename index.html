<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inferior Forces</title>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden; /* importante para no scroll */
}
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(100,100,100,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      display: block;
      width: min(350px, 75vw);
      height: auto;
      position: relative;
      z-index: 1;
      animation: fadeIn 1.4s ease both, float 6s ease-in-out 1.4s infinite;
    }

    .tagline {
      font-family: 'UnifrakturMaguntia', cursive;
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      color: #555555;
      letter-spacing: 0.12em;
      margin-top: 28px;
      text-shadow: 0 0 30px rgba(150,150,150,0.4);
      animation: fadeIn 1.8s ease both;
      position: relative;
      z-index: 1;
    }

    .coming-soon {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #666666;
      text-shadow: 0 0 14px rgba(150,150,150,0.4);
      margin-top: 32px;
      animation: fadeIn 2s ease both;
      position: relative;
      z-index: 1;
    }

    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      animation: fadeIn 2.2s ease both;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666666;
      border: 1px solid rgba(120,120,120,0.4);
      padding: 14px 34px;
      background: rgba(80,80,80,0.08);
      transition: all 0.35s ease;
      margin-bottom: 80px; 
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      flex-shrink: 0;
    }

    .btn:hover {
      background: rgba(120,120,120,0.15);
      border-color: #666666;
      color: #999999;
      box-shadow: 0 0 28px rgba(150,150,150,0.25);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <img class="logo" src="logoif.jpg" alt="Inferior Forces" />

  <p class="tagline">Dead But Dreaming</p>

  <p class="coming-soon">— Volvemos Pronto —</p>

  <div class="buttons">
    <a href="https://www.facebook.com/inferiorforces" target="_blank" rel="noopener" class="btn">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      Facebook
    </a>
    <a href="https://www.instagram.com/inferior_forces" target="_blank" rel="noopener" class="btn">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
      Instagram
    </a>
    <a href="https://docs.google.com/spreadsheets/d/1p3mtU7Mt4IfQWU0fOCR0EV0nTegX6hpW/edit?usp=sharing" target="_blank" rel="noopener" class="btn">
      <svg viewBox="0 0 24 24"><path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Stock Disponible
    </a>
  </div>

</body>
</html>
